<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACME SCHOOL</title>
    <link rel="stylesheet" href="./examenes.css">
    <link rel="stylesheet" href="./main.css">
    <link rel="stylesheet" href="./responsive-examenes.css">
</head>

<body>

    <header class="header">
        <div class="header-div">
            <img class="logo" src="./assets/Logo.png" alt="Acme School" height="100" />
            <button>Resolver Examen</button>
            <button>Usuarios</button>
            <button>Examenes</button>
            <p class="admin-nombre">Adiministrador Acme</p>
            <button class="boton-salir">Salir</button>
        </div>
            
    </header>

    <main>

        
            <div class="container-examenes">
                <p>Banco de pruebas</p>
                <h1>Gestion de Examenes</h1>
                <p><span style="color: #2462aa;">Configura examenes, preguntas y respuestas. Cada pregunta admite una unica respuesta correcta.</span></p>
            </div>

                <section class="examenes-section">
                    <div class="formulario">
                        <h2>Crear examen</h2>
                        <div class="fila-formulario">
                            <div class="form-group">
                                <label for="codigo">Código</label>
                                <input type="text" id="codigo" placeholder="Ej: EX01" />
                            </div>
                            <div class="form-group">
                                <label for="titulo">Título</label>
                                <input type="text" id="titulo" placeholder="" />
                            </div>
                        </div>
                        <div class="fila-formulario">
                            <div class="form-group">
                                <label for="tiempo">Tiempo en minutos</label>
                                <input type="number" id="tiempo" placeholder="Ej: 30" min="1" max="10" />
                            </div>
                            <div class="form-group">
                                <label for="porcentaje">Porcentaje de aprobación</label>
                                <input type="number" id="porcentaje" placeholder="Ej: 60" min="1" max="100" />
                            </div>
                        </div>
                        <div class="fila-formulario">
                            <div class="form-group">
                                <label for="descripcion">Descripción</label>
                                <textarea id="descripcion" rows="3" placeholder=""></textarea>
                            </div>
                        </div>
                    
                        
                        <div class="preguntas-section">
                            <div class="preguntas-header">
                                <p><span style="color: #2d7dd8;">Preguntas</span></p>
                                <button id="btnAgregarPregunta">Agregar pregunta</button>
                            </div>
                            <div id="contenedorPreguntas"></div>
                        </div>
                    </div>
                    <div class="tabla-container">
                        <div class="tabla-header">
                            <h2>Examenes registrados</h2>
                            <span class="badge" id="contadorExamenes">0 registros</span>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Codigo</th>
                                    <th>Examen</th>
                                    <th>Tiempo</th>
                                    <th>Aprobacion</th>
                                    <th>Preguntas</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="tablaExamenes"></tbody>
                        </table>
                    </div>
                </section>

    </main>
    <script src="./examenes.js" ></script>
</body>
</html>
